name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Reconstruct Official Flutter Project
        run: |
          # ১. ব্যাকআপ নেওয়া: আমাদের তৈরি করা lib এবং pubspec ফাইল সাময়িকভাবে আলাদা করা
          mkdir temp_backup
          cp -r lib temp_backup/
          cp pubspec.yaml temp_backup/
          
          # ২. আগের ত্রুটিপূর্ণ ম্যানুয়াল ফোল্ডারগুলো মুছে ফেলা
          rm -rf android lib pubspec.yaml .metadata
          
          # ৩. ফ্লাটার অফিশিয়াল কমান্ড দিয়ে সম্পূর্ণ নিখুঁত অ্যান্ড্রয়েড প্রজেক্ট স্ট্রাকচার লাইভ জেনারেট করা
          flutter create --platforms android .
          
          # ৪. আমাদের কাস্টম প্রীমিয়াম কোড ও ডিপেন্ডেন্সি নতুন প্রজেক্টে ফিরিয়ে আনা
          rm -rf lib pubspec.yaml
          cp -r temp_backup/lib .
          cp temp_backup/pubspec.yaml .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-vanguard-app
          path: build/app/outputs/flutter-apk/app-release.apk
          
