name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Reconstruct Official Flutter Project
        run: |
          # ১. ব্যাকআপ নেওয়া
          mkdir temp_backup
          cp -r lib temp_backup/
          cp pubspec.yaml temp_backup/
          
          # ২. আগের ফোল্ডার মুছে ফেলা
          rm -rf android lib pubspec.yaml .metadata
          
          # ৩. অফিশিয়াল প্রজেক্ট জেনারেট করা
          flutter create --platforms android --project-name=legal_vanguard .
          
          # ৪. মডিফাইSdkVersion: গ্রেডল ফাইলে minSdkVersion ১৯ থেকে বাড়িয়ে ২১ করা (যাতে speech_to_text সাপোর্ট করে)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # ৫. আমাদের কাস্টম প্রীমিয়াম কোড ফিরিয়ে আনা
          rm -rf lib pubspec.yaml
          cp -r temp_backup/lib .
          cp temp_backup/pubspec.yaml .

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-vanguard-app
          path: build/app/outputs/flutter-apk/app-release.apk
          
