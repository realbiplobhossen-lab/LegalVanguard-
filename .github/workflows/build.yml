name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Install Dependencies
        run: flutter pub get

      - name: Auto-generate Configuration & Live Paths
        run: |
          # এই ম্যাজিক কমান্ডটি গিটহাব রানার থেকে ফ্লাটারের লাইভ ডিরেক্টরি রিড করে নিখুঁতভাবে local.properties ফাইল তৈরি করবে
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # প্লাগইন ও প্রজেক্ট কনফিগারেশন সিঙ্ক করা
          flutter precache --android
          flutter build apk --config-only

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-vanguard-app
          path: build/app/outputs/flutter-apk/app-release.apk
          
