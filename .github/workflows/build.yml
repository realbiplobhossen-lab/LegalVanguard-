name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Reconstruct Official Flutter Project
        run: |
          # ১. ব্যাকআপ নেওয়া
          mkdir temp_backup
          cp -r lib temp_backup/
          cp pubspec.yaml temp_backup/
          if [ -f "google-services.json" ]; then cp google-services.json temp_backup/; fi
          
          # ২. আগের ফোল্ডার মুছে ফেলা
          rm -rf android lib pubspec.yaml .metadata
          
          # ৩. অফিশিয়াল প্রজেক্ট জেনারেট করা
          flutter create --platforms android --project-name=legal_vanguard .
          
          # ৪. SdkVersion ২১ করা (speech_to_text এর জন্য)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # ৫. অ্যান্ড্রোয়েড ম্যানিফেস্টে ইন্টারনেট ও অডিও পারমিশন যুক্ত করা
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"\/>' android/app/src/main/AndroidManifest.xml
          
          # ৬. settings.gradle ফাইলে ফায়ারবেস প্লাগইন সংস্করণসহ নিখুঁতভাবে যুক্ত করা
          sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.4.1" apply false' android/settings.gradle
          
          # ৭. app/build.gradle ফাইলে ফায়ারবেস প্লাগইন অ্যাপ্লাই করা
          sed -i '/plugins {/a \    id "com.google.gms.google-services"' android/app/build.gradle
          
          # ৮. আমাদের কাস্টম কোড এবং google-services.json ফিরিয়ে আনা
          rm -rf lib pubspec.yaml
          cp -r temp_backup/lib .
          cp temp_backup/pubspec.yaml .
          if [ -f "temp_backup/google-services.json" ]; then cp temp_backup/google-services.json android/app/; fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-vanguard-app
          path: build/app/outputs/flutter-apk/app-release.apk
          
